name: Mise à jour automatique des prix DVF

on:
  schedule:
    # Le 1er de chaque mois à 3h du matin (UTC).
    # DVF n'est réactualisé que ~2x/an, donc ceci se contente de vérifier
    # régulièrement ; si rien n'a changé, aucun commit n'est créé.
    - cron: '0 3 1 * *'
  workflow_dispatch: {}  # permet aussi un déclenchement manuel depuis l'onglet "Actions"

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Récupérer le dépôt
        uses: actions/checkout@v4

      - name: Installer Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Régénérer prix-communes.json
        run: python update_prix.py

      - name: Committer si le fichier a changé
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add prix-communes.json
          if git diff --staged --quiet; then
            echo "Aucun changement détecté."
          else
            git commit -m "Mise à jour automatique des prix DVF"
            git push
          fi
